displayName: GeoBlock
type: middleware

import: github.com/fa0311/geoblock-api

# the Go package is `package geoblock`, but the module's last path segment is
# `geoblock-api`; basePkg tells Traefik the real package name to call New on.
basePkg: geoblock

summary: "block request based on their country of origin"

testData:
  silentStartUp: false
  allowLocalRequests: false
  logLocalRequests: false
  logAllowedRequests: false
  logApiRequests: true
  api: "https://get.geojs.io/v1/ip/country/{ip}"
  apiTimeoutMs: 150
  cacheSize: 15
  forceMonthlyUpdate: true
  allowUnknownCountries: false
  unknownCountryApiResponse: "nil"
  countries:
    - CH
